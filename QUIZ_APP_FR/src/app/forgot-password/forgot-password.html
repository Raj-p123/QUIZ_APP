<div class="auth-container">
  <div class="auth-card">

    <h2>🔑 Forgot Password</h2>

    <input type="email" placeholder="Enter your email" [(ngModel)]="email" />

    <button class="btn" (click)="sendOtp()">Send OTP</button>

    <div *ngIf="otpSent">
      <input type="text" placeholder="Enter OTP" [(ngModel)]="otp" />
      <input type="password" placeholder="New Password" [(ngModel)]="newPassword" />

      <button class="btn success" (click)="resetPassword()">Reset Password</button>
    </div>

  </div>
</div>
