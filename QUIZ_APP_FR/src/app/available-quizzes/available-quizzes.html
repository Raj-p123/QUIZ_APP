<div class="quizzes-page">

  <!-- HEADER -->
  <div class="quizzes-header">

    <div class="header-left">
      <button class="back-btn" (click)="goBack()">←</button>
      <div>
        <h1>Explore Quizzes</h1>
        <p>Boost your skills with curated quizzes</p>
      </div>
    </div>

    <div class="search-wrapper">
      <span>🔍</span>
      <input 
        type="text" 
        placeholder="Search quizzes..." 
        [(ngModel)]="searchText"
        (input)="onSearchChange()"
      >
    </div>

  </div>

  <!-- SORT -->
  <div class="sort-bar">
    <label>Sort:</label>
    <select [(ngModel)]="sortBy" (change)="onSortChange()">
      <option value="latest">Latest</option>
      <option value="popular">Popular</option>
    </select>
  </div>

  <!-- GRID -->
  <ng-container *ngIf="filteredQuizzes$ | async as quizzes; else loading">

    <div class="quiz-grid-modern" *ngIf="quizzes.length > 0; else noQuizzes">

      <div class="quiz-card-modern"
           *ngFor="let q of quizzes"
           (click)="openQuiz(q.id)">

        <div class="quiz-image">
          <img [src]="getImage(q.coverImageUrl)"
               (error)="handleImageError($event)">

          <div class="quiz-badge">
            {{ q.level || 'Medium' }}
          </div>
        </div>

        <div class="quiz-content">
          <h3>{{ q.title }}</h3>

          <div class="quiz-info">
            <span>⏱ {{ extractTime(q.details) }}</span>
            <span>❓ {{ extractQuestions(q.details) }}</span>
          </div>

          <button class="start-btn">Start Quiz</button>
        </div>

      </div>

    </div>

  </ng-container>

  <!-- LOADING -->
  <ng-template #loading>
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading quizzes...</p>
    </div>
  </ng-template>

  <!-- EMPTY -->
  <ng-template #noQuizzes>
    <div class="state-box">
      <h3>No quizzes found</h3>
      <p>Try different filters.</p>
    </div>
  </ng-template>

</div>
